<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livi. Colchões &amp; Planejados</title>
<link rel="icon" href="https://jbezirmtygdwtiexgfow.supabase.co/storage/v1/object/public/images/1.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;--bg4:#26262c;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f2;--text2:#9090a0;--text3:#60606e;
  --green:#22d07a;--green-bg:rgba(34,208,122,0.1);
  --red:#f05555;--red-bg:rgba(240,85,85,0.1);
  --amber:#f0a830;--amber-bg:rgba(240,168,48,0.1);
  --blue:#5b9cf6;--blue-bg:rgba(91,156,246,0.1);
  --ml:#ffd700;--ml-bg:rgba(255,215,0,0.1);
  --olx:#f57c00;--olx-bg:rgba(245,124,0,0.1);
  --sh:#f06292;--sh-bg:rgba(240,98,146,0.1);
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
#app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo-title{font-size:15px;font-weight:600;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--text);border-left-color:var(--green);background:rgba(34,208,122,.06)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:16px 20px 6px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 32px;max-width:1100px}
.page-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:20px}
.section{display:none}.section.active{display:block}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(15,15,17,.8);display:flex;align-items:center;justify-content:center;z-index:100;font-size:14px;color:var(--text2);gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--bg4);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.mc-label{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.mc-val{font-size:22px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
.mc-sub{font-size:11px;color:var(--text3);margin-top:4px}
.mc-green .mc-val{color:var(--green)}.mc-red .mc-val{color:var(--red)}.mc-amber .mc-val{color:var(--amber)}.mc-blue .mc-val{color:var(--blue)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px 18px}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10px;font-weight:600;color:var(--text3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em}
td{font-size:13px;color:var(--text);padding:10px 14px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.row-click{cursor:pointer}

/* BADGES */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-at{background:var(--red-bg);color:var(--red)}
.b-in{background:#2a0000;color:#ff5555;border:1px solid rgba(255,60,60,.5);font-weight:600}
.b-pe{background:var(--amber-bg);color:var(--amber)}
.b-done{background:var(--bg4);color:var(--text3)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-ml{background:var(--ml-bg);color:var(--ml)}
.b-olx{background:var(--olx-bg);color:var(--olx)}
.b-sh{background:var(--sh-bg);color:var(--sh)}

/* ALERTS */
.alert{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;border:1px solid}
.alert-red{background:var(--red-bg);color:var(--red);border-color:rgba(240,85,85,.2)}
.alert-amber{background:var(--amber-bg);color:var(--amber);border-color:rgba(240,168,48,.2)}

/* BARS */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;text-align:right}
.bar-bg{flex:1;background:var(--bg4);border-radius:3px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.bar-val{font-size:12px;color:var(--text);width:90px;flex-shrink:0;font-family:'DM Mono',monospace}

/* GRIDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-group label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--green)}
select option{background:var(--bg3)}

/* FORM PANEL (collapsible) */
.form-panel{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:18px;margin-bottom:16px;display:none}
.form-panel.open{display:block}

/* DYNAMIC PRODUCT ROWS */
.prod-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.prod-row input{flex:1}
.prod-row-rm{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;font-size:12px;flex-shrink:0;transition:all .15s}
.prod-row-rm:hover{border-color:var(--red);color:var(--red)}

/* BUTTONS */
button.btn{background:var(--green);color:#0f0f11;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;cursor:pointer;transition:opacity .15s;width:100%}
button.btn:hover{opacity:.88}
button.btn:disabled{opacity:.5;cursor:not-allowed}
button.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 14px;cursor:pointer;transition:all .15s}
button.btn-ghost:hover{border-color:var(--green);color:var(--green)}
button.btn-danger{background:transparent;border:1px solid rgba(240,85,85,.3);color:var(--red);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 14px;cursor:pointer;transition:all .15s}
button.btn-danger:hover{background:var(--red-bg);border-color:var(--red)}
.action-btn{background:transparent;border:none;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);border:1px solid var(--border2);color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s}
.action-btn:hover{border-color:var(--green);color:var(--green)}
.action-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* SEARCH ROW */
.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-row input,.search-row select{max-width:200px;width:auto;flex:1}

.msg-ok{font-size:12px;color:var(--green);margin-top:8px}
.msg-err{font-size:12px;color:var(--red);margin-top:8px}
.saldo-pos{color:var(--green);font-weight:600;font-family:'DM Mono',monospace}
.saldo-neg{color:var(--red);font-weight:600;font-family:'DM Mono',monospace}
.mono{font-family:'DM Mono',monospace}

.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:16px;font-weight:600;color:var(--text)}
.modal-close{background:var(--bg4);border:none;color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-body{padding:20px}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.modal-info-item label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.modal-info-item span{font-size:13px;color:var(--text)}
.modal-section-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px}
.parc-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.parc-row:last-child{border-bottom:none}
.parc-paga{color:var(--text3);text-decoration:line-through}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1}
.manual-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:16px;font-size:12px;color:var(--text2);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.manual-toggle:hover{border-color:var(--amber)}
.manual-toggle input[type=checkbox]{width:auto;accent-color:var(--amber)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── MOBILE ── */
@media(max-width:700px){
  .sidebar{display:none}
  .main{padding:14px 14px 80px}
  .page-title{font-size:17px;margin-bottom:14px}
  .metrics{grid-template-columns:1fr 1fr}
  .mc-val{font-size:18px}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  td{padding:9px 10px;font-size:12px}
  th{padding:8px 10px}
  .hide-mob{display:none}
  .modal-info-grid{grid-template-columns:1fr}
  .modal-actions{flex-direction:column}

  .mob-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
  .mob-header-logo{font-size:14px;font-weight:600;color:var(--text)}
  .mob-header-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:50;height:62px;padding-bottom:env(safe-area-inset-bottom)}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:color .15s}
  .bn-item.active{color:var(--green)}
  .bn-item svg{width:20px;height:20px}

  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:55;backdrop-filter:blur(2px)}
  .mob-overlay.open{display:block}

  .mob-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:18px 18px 0 0;border-top:1px solid var(--border2);z-index:60;padding:0 16px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  .mob-drawer.open{transform:translateY(0)}
  .drawer-handle{width:40px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 20px}
  .drawer-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .drawer-item{display:flex;align-items:center;gap:10px;padding:14px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:all .12s}
  .drawer-item svg{width:18px;height:18px;flex-shrink:0}
  .drawer-item.active{color:var(--green);background:var(--green-bg);border-color:rgba(34,208,122,.25)}
}
@media(min-width:701px){
  .mob-header{display:none}
  .bottom-nav{display:none}
  .mob-overlay{display:none!important}
  .mob-drawer{display:none!important}
}
</style>
</head>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <span>Carregando dados...</span>
</div>

<div id="app" style="display:none">
  <nav class="sidebar">

<script>
const { createClient } = supabase;
const SUPA_URL = 'https://jbezirmtygdwtiexgfow.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiZXppcm10eWdkd3RpZXhnZm93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NDQ1MzYsImV4cCI6MjA5NTMyMDUzNn0.DySgkHNl0xwpPi9S11PJxRlNNgf_seLd6h-TQywnJuU';
const db = createClient(SUPA_URL, SUPA_KEY);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const hoje = new Date(); hoje.setHours(0,0,0,0);

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function addMeses(d, n) { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; }
function fmtDate(d) { if (!d||d==='—') return '—'; return new Date(d+'T12:00:00').toLocaleDateString('pt-BR'); }
function fmtMes(d)  { return new Date(d).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}); }
function fmtR(v)    { return 'R$ '+Math.round(v||0).toLocaleString('pt-BR'); }
function diff(a,b)  { return Math.floor((new Date(a)-new Date(b))/86400000); }

function isThisMonth(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr+'T12:00:00');
  return d.getMonth()===hoje.getMonth() && d.getFullYear()===hoje.getFullYear();
}

function parseProds(prod) {
  if (!prod) return [];
  try { const p=JSON.parse(prod); return Array.isArray(p)&&p.length?p:[prod]; } catch { return [prod]; }
}

function platBadge(p) {
  if (p==='ML')  return '<span class="badge b-ml">Mercado Livre</span>';
  if (p==='OLX') return '<span class="badge b-olx">OLX</span>';
  return '<span class="badge b-sh">Shopee</span>';
}

function statusBadge(st) {
  if (st==='inadimplente') return '<span class="badge b-in">⚠ Inadimplente</span>';
  if (st==='atrasado')     return '<span class="badge b-at">Atrasado</span>';
  if (st==='quitado')      return '<span class="badge b-done">Quitado</span>';
  return '<span class="badge b-ok">Em dia</span>';
}

// ─── State ───────────────────────────────────────────────────────────────────
let clientes = [], boletos = [], vendasOnline = [];

// ─── Data Layer ──────────────────────────────────────────────────────────────
async function loadAll() {
  const [
    {data:cls, error:e1}, {data:parc, error:e2},
    {data:bols,error:e3}, {data:vend, error:e4},
  ] = await Promise.all([
    db.from('clientes').select('*').order('created_at',{ascending:false}),
    db.from('parcelas').select('*'),
    db.from('boletos').select('*').order('venc',{ascending:true}),
    db.from('vendas_online').select('*').order('data',{ascending:false}),
  ]);
  if (e1||e2||e3||e4) { console.error('Erro ao carregar',e1||e2||e3||e4); return false; }
  clientes = (cls||[]).map(c => ({...c, parcelas:(parc||[]).filter(p=>p.cliente_id===c.id)}));
  boletos      = bols||[];
  vendasOnline = vend||[];
  return true;
}

function clienteStatus(c) {
  const parc = c.parcelas||[];
  if (parc.length>0 && parc.every(p=>p.paga)) return 'quitado';
  const pend = parc.filter(p=>!p.paga);
  const maxAt = pend.length ? Math.max(...pend.map(p=>diff(hoje,new Date(p.venc+'T12:00:00')))) : 0;
  if (maxAt>15) return 'inadimplente';
  if (c.atrasado_manual||maxAt>3) return 'atrasado';
  return 'em dia';
}

const BOTTOM_TABS = new Set(['visao','clientes','boletos','online']);

function _syncMobNav(id) {
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('bn-'+(BOTTOM_TABS.has(id)?id:'mais'))?.classList.add('active');
  document.querySelectorAll('.drawer-item').forEach(item=>item.classList.toggle('active',item.dataset.tab===id));
}

function showTab(id,el) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.sidebar .nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (el) el.classList.add('active');
  _syncMobNav(id); closeDrawer();
  renders[id]&&renders[id]();
}

function showTabMob(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  _syncMobNav(id); closeDrawer();
  renders[id]&&renders[id]();
}

function openDrawer() {
  const cur=document.querySelector('.section.active')?.id;
  document.querySelectorAll('.drawer-item').forEach(item=>item.classList.toggle('active',item.dataset.tab===cur));
  document.getElementById('mob-overlay')?.classList.add('open');
  document.getElementById('mob-drawer')?.classList.add('open');
}
function closeDrawer() {
  document.getElementById('mob-overlay')?.classList.remove('open');
  document.getElementById('mob-drawer')?.classList.remove('open');
}

function addProdInput(containerId, val='') {
  const c = document.getElementById(containerId); if (!c) return;
  const d = document.createElement('div'); d.className='prod-row';
  d.innerHTML=`<input type="text" placeholder="Ex: Beliche solteiro MDF" value="${esc(val)}">

function getProds(containerId) {
  return [...document.querySelectorAll('#'+containerId+' .prod-row input')]

}

async function salvarEdicaoCliente(cId) {
  const nome    = document.getElementById('e-nome')?.value.trim();
  const tel     = document.getElementById('e-tel')?.value.trim();
  const total   = parseFloat(document.getElementById('e-total')?.value);
  const nparc   = parseInt(document.getElementById('e-nparc')?.value);
  const indicado= document.getElementById('e-indicado')?.value.trim();
  const prods   = getProds('edit-prods');
  if (!nome) { const m=document.getElementById('modal-msg'); if(m){m.className='msg-err';m.textContent='Nome é obrigatório.';} return; }
  const upd = {nome, tel:tel||null, indicado:indicado||null};
  if (!isNaN(total)&&total>0) upd.total=total;
  if (!isNaN(nparc)&&nparc>0) upd.nparc=nparc;
  if (!isNaN(total)&&!isNaN(nparc)&&nparc>0) upd.parc_val=total/nparc;
  if (prods.length) upd.prod=JSON.stringify(prods);
  const {error}=await db.from('clientes').update(upd).eq('id',cId);
  if (error) { const m=document.getElementById('modal-msg'); if(m){m.className='msg-err';m.textContent='Erro: '+error.message;} return; }
  await loadAll();
  _refreshActiveSection();
  abrirModal(cId);
}

async function excluirCliente(cId) {
  if (!confirm('Excluir este cliente e todas as parcelas? Esta ação não pode ser desfeita.')) return;
  const {error}=await db.from('clientes').delete().eq('id',cId);
  if (error) { alert('Erro: '+error.message); return; }
  document.getElementById('modal-overlay').classList.remove('open');
  await loadAll(); renders.clientes();
}

async function toggleAtrasadoManual(cId, val) {
  const {error}=await db.from('clientes').update({atrasado_manual:val}).eq('id',cId);
  if (error) { alert('Erro: '+error.message); return; }
  await loadAll();
  _refreshActiveSection();
  abrirModal(cId);
}

async function marcarParcelaPaga(parcelaId, cId) {
  const today = new Date().toISOString().split('T')[0];
  const {error}=await db.from('parcelas').update({paga:true,pago_em:today}).eq('id',parcelaId);
  if (error) { alert('Erro: '+error.message); return; }
  await loadAll();
  _refreshActiveSection();
  abrirModal(cId);
}

function _refreshActiveSection() {
  const id = document.querySelector('.section.active')?.id;
  if (id&&renders[id]) renders[id]();
}

projecao() {
  const prox=Array.from({length:6},(_,i)=>{const d=addMeses(new Date(hoje),i);return{d,label:fmtMes(d),rec:0,pagar:0,cnt:0};});
  clientes.forEach(c=>(c.parcelas||[]).filter(p=>!p.paga).forEach(p=>{
    prox.forEach(m=>{const pv=new Date(p.venc+'T12:00:00');if(pv.getMonth()===m.d.getMonth()&&pv.getFullYear()===m.d.getFullYear()){m.rec+=p.valor;m.cnt++;}});
  }));
  boletos.filter(b=>!b.pago).forEach(b=>{const bv=new Date(b.venc+'T12:00:00');prox.forEach(m=>{if(bv.getMonth()===m.d.getMonth()&&bv.getFullYear()===m.d.getFullYear())m.pagar+=b.valor;});});
  const totRec6=prox.reduce((s,m)=>s+m.rec,0);
  const totPag6=prox.reduce((s,m)=>s+m.pagar,0);
  const saldo6=totRec6-totPag6;
  const maxBar=Math.max(...prox.flatMap(m=>[m.rec,m.pagar]),1);
  document.getElementById('projecao').innerHTML=`
    <div class="page-title">Projeção financeira</div>
    <div class="metrics">
      <div class="mc mc-green"><div class="mc-label">Receita prevista (6m)</div><div class="mc-val">${fmtR(totRec6)}</div></div>
      <div class="mc mc-red"><div class="mc-label">Boletos a pagar (6m)</div><div class="mc-val">${fmtR(totPag6)}</div></div>
      <div class="mc ${saldo6>=0?'mc-green':'mc-red'}"><div class="mc-label">Saldo líquido (6m)</div><div class="mc-val">${fmtR(saldo6)}</div></div>
    </div>
    <div class="card">
      <div class="card-header">Receber vs pagar — próximos 6 meses</div>
      <div class="card-body">${prox.map(m=>`
        <div style="margin-bottom:16px">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${m.label}</div>
          <div class="bar-row" style="margin-bottom:4px">
            <div class="bar-label" style="color:var(--green);font-size:11px">Receber</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(m.rec/maxBar*100)}%;background:var(--green)"></div></div>
            <div class="bar-val">${fmtR(m.rec)}</div>
          </div>
          <div class="bar-row">
            <div class="bar-label" style="color:var(--red);font-size:11px">Pagar</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(m.pagar/maxBar*100)}%;background:var(--red)"></div></div>
            <div class="bar-val">${fmtR(m.pagar)}</div>
          </div>
        </div>`).join('')}</div>
    </div>
    <div class="card">
      <div class="card-header">Fluxo de caixa mensal</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Mês</th><th>Parcelas</th><th>A receber</th><th>A pagar</th><th>Saldo</th></tr></thead>
        <tbody>${prox.map(m=>{const s=m.rec-m.pagar;return`<tr>
          <td>${m.label}</td><td>${m.cnt}</td>
          <td class="mono" style="color:var(--green)">${fmtR(m.rec)}</td>
          <td class="mono" style="color:var(--red)">${fmtR(m.pagar)}</td>
          <td class="${s>=0?'saldo-pos':'saldo-neg'}">${fmtR(s)}</td>

    </div>`;
},

// ─── Clientes list render (global, called from oninput) ───────────────────────
function _renderCl() {
  const q=(document.getElementById('sc-q')?.value||'').toLowerCase();
  const st=document.getElementById('sc-st')?.value||'';
  const f=clientes.filter(c=>{
    const prods=parseProds(c.prod).join(' ').toLowerCase();
    const matchQ=!q||c.nome.toLowerCase().includes(q)||prods.includes(q);
    const matchSt=!st||clienteStatus(c)===st;
    return matchQ&&matchSt;
  });
  const body=document.getElementById('cl-body'); if (!body) return;
  if (!f.length){body.innerHTML=`<tr><td colspan="5" style="color:var(--text3);text-align:center;padding:20px">Nenhum cliente encontrado</td></tr>`;return;}
  body.innerHTML=f.map(c=>{
    const pagas=(c.parcelas||[]).filter(p=>p.paga).length;
    const st2=clienteStatus(c);
    const prods=parseProds(c.prod);
    const prodLabel=prods.length?prods[0].split(' ').slice(0,2).join(' ')+(prods.length>1?` +${prods.length-1}`:''):'—';
    return`<tr class="row-click" onclick="abrirModal('${c.id}')">
      <td style="font-weight:500" title="${esc(c.nome)}">${esc(c.nome)}</td>
      <td class="hide-mob" title="${esc(prods.join(', '))}">${esc(prodLabel)}</td>
      <td class="hide-mob mono">${fmtR(c.total)}</td>
      <td>${pagas}/${c.nparc||0}</td>
      <td>${statusBadge(st2)}</td>
    </tr>`;
  }).join('');
}

function msg(id,txt,ok){const el=document.getElementById(id);if(el){el.className=ok?'msg-ok':'msg-err';el.textContent=txt;}}

async function cadastrarCliente() {
  const nome=document.getElementById('fn').value.trim();
  const tel=document.getElementById('ft').value.trim();
  const total=parseFloat(document.getElementById('fv').value);
  const nparc=parseInt(document.getElementById('fnp').value);
  const ds=document.getElementById('fd').value;
  const indicado=document.getElementById('fi').value.trim();
  const prods=getProds('new-prods');
  if (!nome||!tel||!total||!nparc||!ds){msg('fm','Preencha todos os campos obrigatórios.',false);return;}
  const btn=document.getElementById('btn-cl');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const parc_val=total/nparc;
  const inicio=new Date(ds+'T12:00:00');
  const {data:novo,error:e1}=await db.from('clientes').insert({
    nome,tel,prod:prods.length?JSON.stringify(prods):null,total,nparc,parc_val,
    indicado:indicado||null,atrasado_manual:false
  }).select().single();
  if(e1){msg('fm','Erro: '+e1.message,false);if(btn){btn.disabled=false;btn.textContent='Cadastrar cliente';}return;}
  const parcelas=Array.from({length:nparc},(_,i)=>({
    cliente_id:novo.id,num:i+1,
    venc:addMeses(new Date(inicio),i).toISOString().split('T')[0],
    valor:parc_val,paga:false
  }));
  const {error:e2}=await db.from('parcelas').insert(parcelas);
  if(e2){msg('fm','Erro parcelas: '+e2.message,false);if(btn){btn.disabled=false;btn.textContent='Cadastrar cliente';}return;}
  msg('fm',`"${nome}" cadastrado com sucesso!`,true);
  if(btn){btn.disabled=false;btn.textContent='Cadastrar cliente';}
  ['fn','ft','fv','fnp'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('new-prods').innerHTML=''; addProdInput('new-prods');
  await loadAll(); renders.clientes();
}

async function cadastrarBoleto() {
  const forn=document.getElementById('bf').value.trim();
  const desc=document.getElementById('bd').value.trim();
  const valor=parseFloat(document.getElementById('bv').value);
  const ds=document.getElementById('bvenc').value;
  if(!forn||!desc||!valor||!ds){msg('bm','Preencha todos os campos.',false);return;}
  const btn=document.getElementById('btn-bol');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const {error}=await db.from('boletos').insert({fornecedor:forn,descricao:desc,valor,venc:new Date(ds+'T12:00:00').toISOString().split('T')[0],pago:false});
  if(error){msg('bm','Erro: '+error.message,false);if(btn){btn.disabled=false;btn.textContent='Cadastrar boleto';}return;}
  msg('bm','Boleto cadastrado!',true);
  if(btn){btn.disabled=false;btn.textContent='Cadastrar boleto';}
  ['bf','bd','bv','bvenc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  await loadAll(); renders.boletos();
}

async function cadastrarOnline() {
  const plat=document.getElementById('op').value;
  const prod=document.getElementById('oprod').value.trim();
  const valor=parseFloat(document.getElementById('ov').value);
  const ds=document.getElementById('od').value;
  if(!valor||!ds){msg('om','Preencha todos os campos.',false);return;}
  const btn=document.getElementById('btn-on');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const {error}=await db.from('vendas_online').insert({plat,prod:prod||'—',valor,data:new Date(ds+'T12:00:00').toISOString().split('T')[0],status:'aguardando repasse'});
  if(error){msg('om','Erro: '+error.message,false);if(btn){btn.disabled=false;btn.textContent='Registrar venda';}return;}
  msg('om','Venda registrada!',true);
  if(btn){btn.disabled=false;btn.textContent='Registrar venda';}
  const el=document.getElementById('ov');if(el)el.value='';
  await loadAll(); renders.online();
}

async function marcarBoletoPago(id) {
  if(!confirm('Marcar este boleto como pago?'))return;
  const {error}=await db.from('boletos').update({pago:true}).eq('id',id);
  if(error){alert('Erro: '+error.message);return;}
  await loadAll(); renders.boletos();
}

async function excluirBoleto(id) {
  if(!confirm('Excluir este boleto?'))return;
  const {error}=await db.from('boletos').delete().eq('id',id);
  if(error){alert('Erro: '+error.message);return;}
  await loadAll(); renders.boletos();
}

async function marcarRepassado(id) {
  if(!confirm('Marcar esta venda como repassada?'))return;
  const {error}=await db.from('vendas_online').update({status:'repassado'}).eq('id',id);
  if(error){alert('Erro: '+error.message);return;}
  await loadAll(); renders.online();
}

async function excluirVenda(id) {
  if(!confirm('Excluir esta venda?'))return;
  const {error}=await db.from('vendas_online').delete().eq('id',id);
  if(error){alert('Erro: '+error.message);return;}
  await loadAll(); renders.online();
}

async function reverterParcelaPaga(parcelaId, cId) {
  if (!confirm('Reverter este pagamento para pendente?')) return;
  const {error}=await db.from('parcelas').update({paga:false,pago_em:null}).eq('id',parcelaId);
  if (error){alert('Erro: '+error.message);return;}
  await loadAll(); _refreshActiveSection(); abrirModal(cId);
}

async function reverterBoletoPago(id) {
  if (!confirm('Reverter este boleto para pendente?')) return;
  const {error}=await db.from('boletos').update({pago:false}).eq('id',id);
  if (error){alert('Erro: '+error.message);return;}
  await loadAll(); renders.boletos();
}
